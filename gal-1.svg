<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#070d1e"/>
      <stop offset="100%" stop-color="#1a2860"/>
    </linearGradient>
    <linearGradient id="stage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#253a8a"/>
      <stop offset="100%" stop-color="#0f1840"/>
    </linearGradient>
    <linearGradient id="trophy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd060"/>
      <stop offset="100%" stop-color="#c08020"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="spotlight">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Seyirci kalabalığı silueti -->
  <ellipse cx="400" cy="390" rx="400" ry="60" fill="#0c1230" opacity="0.9"/>
  <rect x="0" y="360" width="800" height="90" fill="#080e1e"/>

  <!-- Kalabalık nokta deseni -->
  <g fill="#1a2a60" opacity="0.6">
    <rect x="30"  y="355" width="8" height="12" rx="4"/>
    <rect x="60"  y="350" width="8" height="16" rx="4"/>
    <rect x="90"  y="358" width="8" height="12" rx="4"/>
    <rect x="120" y="352" width="8" height="14" rx="4"/>
    <rect x="150" y="356" width="8" height="12" rx="4"/>
    <rect x="180" y="348" width="8" height="18" rx="4"/>
    <rect x="210" y="354" width="8" height="14" rx="4"/>
    <rect x="240" y="350" width="8" height="16" rx="4"/>
    <rect x="270" y="356" width="8" height="12" rx="4"/>
    <rect x="300" y="352" width="8" height="15" rx="4"/>
    <rect x="330" y="348" width="8" height="18" rx="4"/>
    <rect x="360" y="354" width="8" height="14" rx="4"/>
    <rect x="390" y="350" width="8" height="16" rx="4"/>
    <rect x="420" y="356" width="8" height="12" rx="4"/>
    <rect x="450" y="352" width="8" height="15" rx="4"/>
    <rect x="480" y="348" width="8" height="18" rx="4"/>
    <rect x="510" y="354" width="8" height="14" rx="4"/>
    <rect x="540" y="350" width="8" height="16" rx="4"/>
    <rect x="570" y="356" width="8" height="12" rx="4"/>
    <rect x="600" y="352" width="8" height="14" rx="4"/>
    <rect x="630" y="348" width="8" height="18" rx="4"/>
    <rect x="660" y="354" width="8" height="14" rx="4"/>
    <rect x="690" y="350" width="8" height="16" rx="4"/>
    <rect x="720" y="356" width="8" height="12" rx="4"/>
    <rect x="750" y="352" width="8" height="15" rx="4"/>
  </g>

  <!-- Sahne zemini -->
  <rect x="100" y="270" width="600" height="100" fill="url(#stage)" rx="4"/>
  <rect x="100" y="265" width="600" height="8" fill="#4060d0" opacity="0.6" rx="2"/>

  <!-- Spotlight ışıkları -->
  <polygon points="100,0 200,270 0,270" fill="#4060ff" opacity="0.05" filter="url(#spotlight)"/>
  <polygon points="700,0 800,270 600,270" fill="#4060ff" opacity="0.05" filter="url(#spotlight)"/>
  <polygon points="400,0 460,270 340,270" fill="#8090ff" opacity="0.07" filter="url(#spotlight)"/>

  <!-- Işık huzmesi çizgileri -->
  <line x1="100" y1="0" x2="200" y2="270" stroke="#6080ff" stroke-width="1" opacity="0.15"/>
  <line x1="700" y1="0" x2="600" y2="270" stroke="#6080ff" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="0" x2="340" y2="270" stroke="#aab0ff" stroke-width="1" opacity="0.12"/>
  <line x1="400" y1="0" x2="460" y2="270" stroke="#aab0ff" stroke-width="1" opacity="0.12"/>

  <!-- Kupa (Trophy) -->
  <g transform="translate(400,210)" filter="url(#glow)">
    <rect x="-8" y="50" width="16" height="30" fill="url(#trophy)"/>
    <rect x="-25" y="78" width="50" height="8" fill="url(#trophy)" rx="2"/>
    <ellipse cx="0" cy="0" rx="40" ry="55" fill="none" stroke="url(#trophy)" stroke-width="4"/>
    <path d="M-40,0 C-55,-20 -55,-50 -30,-55" fill="none" stroke="url(#trophy)" stroke-width="4"/>
    <path d="M40,0 C55,-20 55,-50 30,-55" fill="none" stroke="url(#trophy)" stroke-width="4"/>
    <circle cx="0" cy="-10" r="8" fill="url(#trophy)" opacity="0.8"/>
    <text x="0" y="-5" text-anchor="middle" fill="#0a1230" font-family="Arial Black,sans-serif" font-size="10" font-weight="900">1</text>
  </g>

  <!-- Konfeti -->
  <g opacity="0.7">
    <rect x="140" y="80" width="6" height="6" fill="#ffd060" transform="rotate(30 143 83)"/>
    <rect x="220" y="120" width="5" height="5" fill="#ff6080" transform="rotate(45 222 122)"/>
    <rect x="300" y="60" width="6" height="6" fill="#60d0ff" transform="rotate(20 303 63)"/>
    <rect x="500" y="100" width="5" height="5" fill="#ffd060" transform="rotate(60 502 102)"/>
    <rect x="600" y="70" width="6" height="6" fill="#80ff90" transform="rotate(35 603 73)"/>
    <rect x="660" y="130" width="5" height="5" fill="#ff6080" transform="rotate(50 662 132)"/>
    <rect x="180" y="160" width="5" height="5" fill="#a060ff" transform="rotate(25 182 162)"/>
    <rect x="560" y="150" width="6" height="6" fill="#60d0ff" transform="rotate(40 563 153)"/>
  </g>

  <!-- Ekranlar arka planda -->
  <rect x="110" y="200" width="140" height="80" fill="#1a2460" rx="2" opacity="0.7"/>
  <rect x="115" y="205" width="130" height="70" fill="#536bd3" rx="1" opacity="0.4"/>
  <rect x="550" y="200" width="140" height="80" fill="#1a2460" rx="2" opacity="0.7"/>
  <rect x="555" y="205" width="130" height="70" fill="#536bd3" rx="1" opacity="0.4"/>

  <!-- CS2 logosu -->
  <text x="400" y="155" text-anchor="middle" fill="#ffffff" font-family="Arial Black,sans-serif"
        font-size="18" font-weight="900" letter-spacing="4" opacity="0.9" filter="url(#glow)">CS2</text>

  <!-- Alt başlık -->
  <text x="400" y="402" text-anchor="middle" fill="#ffffff" font-family="Arial Black,sans-serif"
        font-size="20" font-weight="900" letter-spacing="3" opacity="0.95" filter="url(#glow)">SPRING CUP 2026 — GRAND FINAL</text>
  <rect x="230" y="410" width="340" height="2" rx="1" fill="#4060e0" opacity="0.7"/>
  <text x="400" y="430" text-anchor="middle" fill="#6080c0" font-family="Arial,sans-serif"
        font-size="11" letter-spacing="3" opacity="0.8">NEXUS ESPORTS · İSTANBUL</text>
</svg>
