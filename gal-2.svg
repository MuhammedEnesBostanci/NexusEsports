<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0305"/>
      <stop offset="100%" stop-color="#2a0a10"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c03040"/>
      <stop offset="100%" stop-color="#ff6070"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="firework">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Diagonal çizgiler arka plan -->
  <g stroke="#c03040" stroke-width="1" opacity="0.1">
    <line x1="100" y1="0" x2="0" y2="200"/>
    <line x1="250" y1="0" x2="100" y2="300"/>
    <line x1="400" y1="0" x2="250" y2="380"/>
    <line x1="550" y1="0" x2="400" y2="420"/>
    <line x1="700" y1="0" x2="550" y2="420"/>
    <line x1="800" y1="100" x2="650" y2="420"/>
  </g>

  <!-- Sol diagonal panel -->
  <polygon points="0,0 350,0 250,450 0,450" fill="#1a0508" opacity="0.7"/>

  <!-- Havai fişekler -->
  <g filter="url(#firework)">
    <circle cx="150" cy="100" r="40" fill="#ff6040" opacity="0.3"/>
    <circle cx="650" cy="80" r="35" fill="#ff4060" opacity="0.25"/>
    <circle cx="400" cy="60" r="30" fill="#ff8040" opacity="0.2"/>
  </g>
  <!-- Havai fişek ışınları -->
  <g stroke="#ff6040" stroke-width="1.5" opacity="0.5">
    <line x1="150" y1="60" x2="150" y2="80"/>
    <line x1="150" y1="140" x2="150" y2="120"/>
    <line x1="110" y1="100" x2="130" y2="100"/>
    <line x1="190" y1="100" x2="170" y2="100"/>
    <line x1="122" y1="72" x2="134" y2="84"/>
    <line x1="178" y1="72" x2="166" y2="84"/>
    <line x1="122" y1="128" x2="134" y2="116"/>
    <line x1="178" y1="128" x2="166" y2="116"/>
  </g>
  <g stroke="#ff4060" stroke-width="1.5" opacity="0.4">
    <line x1="650" y1="45" x2="650" y2="60"/>
    <line x1="650" y1="115" x2="650" y2="100"/>
    <line x1="615" y1="80" x2="630" y2="80"/>
    <line x1="685" y1="80" x2="670" y2="80"/>
    <line x1="625" y1="55" x2="635" y2="65"/>
    <line x1="675" y1="55" x2="665" y2="65"/>
  </g>

  <!-- V logosu büyük -->
  <g transform="translate(400,220)" filter="url(#glow)">
    <polygon points="-110,-80 0,100 110,-80 88,-80 0,70 -88,-80"
             fill="none" stroke="url(#red)" stroke-width="4" opacity="0.75"/>
    <polygon points="-68,-80 0,30 68,-80 50,-80 0,10 -50,-80"
             fill="#c03040" opacity="0.18"/>
  </g>

  <!-- Seyircilerden gelen renk efekti (altta) -->
  <rect x="0" y="370" width="800" height="80" fill="#0a0205"/>
  <g fill="#c03040" opacity="0.15">
    <rect x="20"  y="375" width="6" height="10" rx="3"/>
    <rect x="50"  y="370" width="6" height="14" rx="3"/>
    <rect x="80"  y="377" width="6" height="10" rx="3"/>
    <rect x="110" y="372" width="6" height="13" rx="3"/>
    <rect x="140" y="368" width="6" height="16" rx="3"/>
    <rect x="170" y="375" width="6" height="10" rx="3"/>
    <rect x="200" y="373" width="6" height="12" rx="3"/>
    <rect x="230" y="369" width="6" height="15" rx="3"/>
    <rect x="260" y="376" width="6" height="11" rx="3"/>
    <rect x="290" y="371" width="6" height="14" rx="3"/>
    <rect x="320" y="375" width="6" height="10" rx="3"/>
    <rect x="350" y="370" width="6" height="14" rx="3"/>
    <rect x="380" y="377" width="6" height="10" rx="3"/>
    <rect x="410" y="372" width="6" height="13" rx="3"/>
    <rect x="440" y="368" width="6" height="16" rx="3"/>
    <rect x="470" y="375" width="6" height="10" rx="3"/>
    <rect x="500" y="373" width="6" height="12" rx="3"/>
    <rect x="530" y="369" width="6" height="15" rx="3"/>
    <rect x="560" y="376" width="6" height="11" rx="3"/>
    <rect x="590" y="371" width="6" height="14" rx="3"/>
    <rect x="620" y="375" width="6" height="10" rx="3"/>
    <rect x="650" y="370" width="6" height="14" rx="3"/>
    <rect x="680" y="377" width="6" height="10" rx="3"/>
    <rect x="710" y="372" width="6" height="13" rx="3"/>
    <rect x="740" y="368" width="6" height="16" rx="3"/>
    <rect x="770" y="375" width="6" height="10" rx="3"/>
  </g>

  <!-- Sol aksan -->
  <rect x="0" y="0" width="4" height="450" fill="url(#red)"/>

  <!-- Alt başlık alanı -->
  <text x="400" y="400" text-anchor="middle" fill="#ffffff" font-family="Arial Black,sans-serif"
        font-size="22" font-weight="900" letter-spacing="6" opacity="0.95" filter="url(#glow)">VALORANT</text>
  <rect x="270" y="410" width="260" height="2" rx="1" fill="url(#red)" opacity="0.7"/>
  <text x="400" y="432" text-anchor="middle" fill="#c03040" font-family="Arial,sans-serif"
        font-size="11" letter-spacing="4" opacity="0.8">AÇILIŞ SEROMONİSİ 2026</text>
</svg>
