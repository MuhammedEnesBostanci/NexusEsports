<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1e38"/>
      <stop offset="100%" stop-color="#050e1c"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur in="SourceGraphic" stdDeviation="1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <polygon points="8,0 40,0 40,40 0,40 0,8" fill="url(#bg)"/>
  <polygon points="0,8 8,0 11,0 0,11" fill="#1a8cff"/>
  <rect x="0" y="36" width="40" height="4" fill="#1a8cff"/>
  <!-- Aurora arcs rising from base -->
  <path d="M6 30 Q13 6 20 10 Q27 6 34 30" stroke="#1a8cff" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M10 30 Q15 12 20 15 Q25 12 30 30" stroke="#4db0ff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M14 30 Q17 18 20 20 Q23 18 26 30" stroke="#80ccff" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Star at peak -->
  <circle cx="20" cy="9" r="2.5" fill="#1a8cff" filter="url(#glow)"/>
</svg>
