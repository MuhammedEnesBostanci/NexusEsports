<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e0404"/>
      <stop offset="100%" stop-color="#0a0101"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur in="SourceGraphic" stdDeviation="1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <polygon points="8,0 40,0 40,40 0,40 0,8" fill="url(#bg)"/>
  <polygon points="0,8 8,0 11,0 0,11" fill="#e53535"/>
  <rect x="0" y="36" width="40" height="4" fill="#e53535"/>
  <!-- Horizon line -->
  <line x1="4" y1="22" x2="36" y2="22" stroke="#e53535" stroke-width="2" stroke-linecap="round"/>
  <!-- Speed lines (converging to right = motion blur) -->
  <line x1="4"  y1="16" x2="36" y2="14" stroke="#e53535" stroke-width="1.8" stroke-linecap="round" opacity="0.9" filter="url(#glow)"/>
  <line x1="4"  y1="11" x2="36" y2="7"  stroke="#e53535" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="4"  y1="28" x2="36" y2="30" stroke="#e53535" stroke-width="1.8" stroke-linecap="round" opacity="0.9" filter="url(#glow)"/>
  <line x1="4"  y1="33" x2="36" y2="35" stroke="#e53535" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <!-- Speed arrow tip -->
  <polygon points="34,19 40,22 34,25" fill="#e53535" filter="url(#glow)"/>
</svg>
