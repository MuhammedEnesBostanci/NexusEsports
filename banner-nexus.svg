<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0a0a08"/>
      <stop offset="60%" stop-color="#141208"/>
      <stop offset="100%" stop-color="#1e1808"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#c07a10"/>
      <stop offset="50%"  stop-color="#f5a31a"/>
      <stop offset="100%" stop-color="#ffc040"/>
    </linearGradient>
    <radialGradient id="glow-center" cx="50%" cy="45%" r="40%">
      <stop offset="0%"   stop-color="#f5a31a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f5a31a" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="420" fill="url(#bg)"/>
  <rect width="800" height="420" fill="url(#glow-center)"/>

  <!-- Altıgen arka plan deseni -->
  <g stroke="#f5a31a" stroke-width="0.5" opacity="0.08" fill="none">
    <polygon points="400,60 460,95 460,165 400,200 340,165 340,95"/>
    <polygon points="400,60 460,95 460,165 400,200 340,165 340,95" transform="scale(1.6) translate(-150,-75)"/>
    <polygon points="400,60 460,95 460,165 400,200 340,165 340,95" transform="scale(2.4) translate(-233,-117)"/>
  </g>

  <!-- N logosu -->
  <g transform="translate(400,170)" filter="url(#glow)">
    <rect x="-50" y="-70" width="16" height="140" fill="url(#orange)" rx="2"/>
    <rect x="34"  y="-70" width="16" height="140" fill="url(#orange)" rx="2"/>
    <polygon points="-34,-70 34,70 34,40 -34,-40" fill="url(#orange)" opacity="0.9"/>
  </g>

  <!-- Sol aksan -->
  <rect x="0" y="0" width="4" height="420" fill="url(#orange)"/>

  <!-- Başlık -->
  <text x="400" y="338" text-anchor="middle" fill="#ffffff" font-family="Arial Black,sans-serif"
        font-size="42" font-weight="900" letter-spacing="10" opacity="0.9" filter="url(#glow)">NEXUS ESPORTS</text>
  <rect x="220" y="350" width="360" height="2" rx="1" fill="url(#orange)" opacity="0.8"/>
  <text x="400" y="378" text-anchor="middle" fill="#f5a31a" font-family="Arial,sans-serif"
        font-size="12" letter-spacing="5" opacity="0.8">TÜRKİYE'NİN ESPOR MERKEZİ</text>
</svg>
