<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1400"/>
      <stop offset="100%" stop-color="#080600"/>
    </linearGradient>
  </defs>
  <rect width="40" height="40" fill="url(#bg)"/>
  <rect x="0" y="36" width="40" height="4" fill="#f0c040"/>
  <!-- Helmet circle -->
  <circle cx="20" cy="19" r="11" fill="none" stroke="#f0c040" stroke-width="2.5"/>
  <!-- Helmet top flat edge (visor top) -->
  <rect x="9" y="8" width="22" height="3.5" rx="1.5" fill="#f0c040"/>
  <!-- Visor slit -->
  <path d="M10 22 Q20 30 30 22" stroke="#f0c040" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
