<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Paneli – Nexus Esports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Admin genel ── */
    body { background: var(--clr-bg); min-height: 100vh; }

    .admin-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: var(--space-xl) var(--space-md);
    }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-xl);
      flex-wrap: wrap;
      gap: var(--space-sm);
    }

    .admin-title {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .admin-title span { color: var(--clr-primary); }

    .admin-stats {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
      margin-bottom: var(--space-lg);
    }

    .stat-card {
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-md);
      padding: var(--space-sm) var(--space-md);
      min-width: 130px;
      text-align: center;
    }
    .stat-card .stat-num {
      font-family: var(--font-heading);
      font-size: 2rem;
      font-weight: 700;
      color: var(--clr-primary);
      display: block;
    }
    .stat-card .stat-lbl {
      font-size: var(--text-xs);
      color: var(--clr-text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .stat-card.okunmadi .stat-num { color: var(--clr-accent, #f59e0b); }

    /* ── Toolbar ── */
    .admin-toolbar {
      display: flex;
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
      flex-wrap: wrap;
      align-items: center;
    }
    .admin-toolbar input {
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-sm);
      color: var(--clr-text);
      padding: 0.45rem 0.75rem;
      font-size: var(--text-sm);
      font-family: var(--font-body);
      flex: 1;
      min-width: 180px;
    }
    .admin-toolbar input:focus { outline: 2px solid var(--clr-primary); border-color: transparent; }

    .admin-toolbar select {
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-sm);
      color: var(--clr-text);
      padding: 0.45rem 0.75rem;
      font-size: var(--text-sm);
      font-family: var(--font-body);
    }

    .btn-danger {
      background: #ef4444;
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 0.45rem 1rem;
      font-family: var(--font-heading);
      font-size: var(--text-xs);
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-danger:hover { background: #dc2626; }

    .btn-outline {
      background: transparent;
      color: var(--clr-text-muted);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-sm);
      padding: 0.45rem 1rem;
      font-family: var(--font-heading);
      font-size: var(--text-xs);
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-outline:hover { border-color: var(--clr-primary); color: var(--clr-primary); }

    /* ── Mesaj kartları ── */
    .msg-list { display: flex; flex-direction: column; gap: var(--space-sm); }

    .msg-card {
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      transition: border-color 0.2s;
      position: relative;
    }
    .msg-card.yeni {
      border-left: 3px solid var(--clr-primary);
    }
    .msg-card:hover { border-color: var(--clr-primary-dim, #5b3eff66); }

    .msg-card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: var(--space-xs);
      margin-bottom: var(--space-sm);
    }

    .msg-from {
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 700;
      color: var(--clr-text);
    }
    .msg-email {
      font-size: var(--text-xs);
      color: var(--clr-primary);
      margin-top: 2px;
    }

    .msg-meta {
      display: flex;
      gap: var(--space-xs);
      flex-wrap: wrap;
      align-items: center;
    }

    .tag {
      display: inline-block;
      background: var(--clr-bg);
      border: 1px solid var(--clr-border);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: var(--text-2xs);
      font-family: var(--font-heading);
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--clr-text-muted);
    }
    .tag.yeni-tag {
      background: var(--clr-primary);
      color: #fff;
      border-color: var(--clr-primary);
    }

    .msg-tarih {
      font-size: var(--text-2xs);
      color: var(--clr-text-dim);
    }

    .msg-body {
      font-size: var(--text-sm);
      color: var(--clr-text-muted);
      line-height: 1.6;
      margin-bottom: var(--space-sm);
      white-space: pre-wrap;
    }

    .msg-actions {
      display: flex;
      gap: var(--space-xs);
    }

    .btn-xs {
      padding: 0.3rem 0.7rem;
      font-size: var(--text-2xs);
      font-family: var(--font-heading);
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid var(--clr-border);
      background: var(--clr-bg);
      color: var(--clr-text-muted);
      transition: all 0.2s;
    }
    .btn-xs:hover { border-color: var(--clr-primary); color: var(--clr-primary); }
    .btn-xs.del:hover { border-color: #ef4444; color: #ef4444; }

    /* ── Boş durum ── */
    .empty-state {
      text-align: center;
      padding: var(--space-2xl);
      color: var(--clr-text-dim);
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: var(--space-sm); }
    .empty-state p { font-size: var(--text-sm); }

    /* ── Login ekranı ── */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--clr-bg);
    }

    .login-card {
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .login-logo {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: var(--space-lg);
    }
    .login-logo span { color: var(--clr-primary); }

    .login-card h2 {
      font-family: var(--font-heading);
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--clr-text-muted);
      margin-bottom: var(--space-lg);
    }

    .login-group { margin-bottom: var(--space-md); text-align: left; }
    .login-group label {
      display: block;
      font-size: var(--text-xs);
      font-family: var(--font-heading);
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--clr-text-muted);
      margin-bottom: var(--space-xs);
    }
    .login-group input {
      width: 100%;
      background: var(--clr-bg);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-sm);
      color: var(--clr-text);
      padding: 0.6rem 0.9rem;
      font-size: var(--text-sm);
      font-family: var(--font-body);
      box-sizing: border-box;
    }
    .login-group input:focus { outline: 2px solid var(--clr-primary); border-color: transparent; }

    .login-err {
      color: #ef4444;
      font-size: var(--text-xs);
      margin-bottom: var(--space-sm);
      min-height: 1.2em;
    }

    #adminPanel { display: none; }
  </style>
</head>
<body>

  <!-- ═══════════════ GİRİŞ EKRANI ═══════════════ -->
  <div id="loginScreen">
    <div class="login-card">
      <div class="login-logo"><span>NEXUS</span> ESPORTS</div>
      <h2>Admin Paneli</h2>

      <div class="login-group">
        <label for="adminUser">Kullanıcı Adı</label>
        <input type="text" id="adminUser" placeholder="admin" autocomplete="username" />
      </div>
      <div class="login-group">
        <label for="adminPass">Şifre</label>
        <input type="password" id="adminPass" placeholder="••••••" autocomplete="current-password" />
      </div>

      <p class="login-err" id="loginErr"></p>

      <button class="btn btn-primary" id="loginBtn" style="width:100%; justify-content:center;">
        Giriş Yap
      </button>
    </div>
  </div>

  <!-- ═══════════════ ADMİN PANELİ ═══════════════ -->
  <div id="adminPanel">

    <!-- Üst bar -->
    <div style="background: var(--clr-surface); border-bottom: 1px solid var(--clr-border); padding: 0.75rem 1.5rem; display:flex; align-items:center; justify-content:space-between; gap: 1rem; flex-wrap:wrap;">
      <a href="index.html" class="nav-logo" style="text-decoration:none;">
        <span class="logo-name"><em>NEXUS</em><span class="logo-sub">ESPORTS</span></span>
      </a>
      <div style="display:flex; gap: 0.75rem; align-items:center;">
        <a href="iletisim.html" class="btn-outline" style="text-decoration:none; padding:0.4rem 0.9rem; font-size:0.7rem; border-radius:4px; border:1px solid var(--clr-border); color:var(--clr-text-muted); font-family:var(--font-heading); text-transform:uppercase; letter-spacing:1px;">
          İletişim Formu
        </a>
        <button class="btn-outline" id="logoutBtn">Çıkış</button>
      </div>
    </div>

    <div class="admin-wrap">

      <!-- Başlık -->
      <div class="admin-header">
        <div class="admin-title">Gelen <span>Mesajlar</span></div>
      </div>

      <!-- İstatistikler -->
      <div class="admin-stats">
        <div class="stat-card">
          <span class="stat-num" id="statToplam">0</span>
          <span class="stat-lbl">Toplam</span>
        </div>
        <div class="stat-card okunmadi">
          <span class="stat-num" id="statYeni">0</span>
          <span class="stat-lbl">Okunmadı</span>
        </div>
        <div class="stat-card">
          <span class="stat-num" id="statOkundu">0</span>
          <span class="stat-lbl">Okundu</span>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="admin-toolbar">
        <input type="text" id="searchInput" placeholder="Ad, e-posta veya mesajda ara…" />
        <select id="filterKonu">
          <option value="">Tüm Konular</option>
          <option value="turnuva">Turnuva Kaydı</option>
          <option value="sponsor">Sponsorluk Teklifi</option>
          <option value="takim">Takım Başvurusu</option>
          <option value="teknik">Teknik Destek</option>
          <option value="basin">Basın ve Medya</option>
          <option value="diger">Diğer</option>
        </select>
        <select id="filterOkundu">
          <option value="">Tümü</option>
          <option value="yeni">Okunmadı</option>
          <option value="okundu">Okundu</option>
        </select>
        <button class="btn-outline" id="tumunuOkuBtn">Tümünü Okundu İşaretle</button>
        <button class="btn-danger" id="tumunuSilBtn">Tümünü Sil</button>
      </div>

      <!-- Liste -->
      <div class="msg-list" id="msgList"></div>

    </div>
  </div>

  <script>
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'nexus2026';
    const STORAGE_KEY = 'nx_mesajlar';
    const SESSION_KEY = 'nx_admin_ok';

    const KONU_LABEL = {
      turnuva: 'Turnuva Kaydı',
      sponsor: 'Sponsorluk',
      takim: 'Takım Başvurusu',
      teknik: 'Teknik Destek',
      basin: 'Basın & Medya',
      diger: 'Diğer',
    };

    const OYUN_LABEL = {
      cs2: 'CS2', valorant: 'VALORANT', lol: 'LoL',
      dota2: 'Dota 2', pubg: 'PUBG Mobile', fortnite: 'Fortnite',
    };

    /* ── Auth ── */
    function checkAuth() {
      return sessionStorage.getItem(SESSION_KEY) === '1';
    }

    function showPanel() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      renderAll();
    }

    if (checkAuth()) showPanel();

    document.getElementById('loginBtn').addEventListener('click', doLogin);
    document.getElementById('adminPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    function doLogin() {
      const u = document.getElementById('adminUser').value.trim();
      const p = document.getElementById('adminPass').value;
      if (u === ADMIN_USER && p === ADMIN_PASS) {
        sessionStorage.setItem(SESSION_KEY, '1');
        showPanel();
      } else {
        document.getElementById('loginErr').textContent = 'Kullanıcı adı veya şifre hatalı.';
      }
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem(SESSION_KEY);
      location.reload();
    });

    /* ── Veri ── */
    function getMesajlar() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }
    function setMesajlar(list) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    }

    /* ── Render ── */
    function renderAll() {
      const mesajlar = getMesajlar();
      const q = document.getElementById('searchInput').value.toLowerCase();
      const konu = document.getElementById('filterKonu').value;
      const okuFilter = document.getElementById('filterOkundu').value;

      const filtered = mesajlar.filter(m => {
        const haystack = (m.ad + m.email + m.mesaj + m.konu).toLowerCase();
        if (q && !haystack.includes(q)) return false;
        if (konu && m.konu !== konu) return false;
        if (okuFilter === 'yeni' && m.okundu) return false;
        if (okuFilter === 'okundu' && !m.okundu) return false;
        return true;
      });

      document.getElementById('statToplam').textContent = mesajlar.length;
      document.getElementById('statYeni').textContent = mesajlar.filter(m => !m.okundu).length;
      document.getElementById('statOkundu').textContent = mesajlar.filter(m => m.okundu).length;

      const list = document.getElementById('msgList');

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state">
          <div class="empty-icon">📭</div>
          <p>${mesajlar.length === 0 ? 'Henüz mesaj yok. İletişim formundan ilk mesajı gönderin.' : 'Filtrelerle eşleşen mesaj bulunamadı.'}</p>
        </div>`;
        return;
      }

      list.innerHTML = filtered.map(m => `
        <div class="msg-card ${m.okundu ? '' : 'yeni'}" data-id="${m.id}">
          <div class="msg-card-head">
            <div>
              <div class="msg-from">${esc(m.ad)}</div>
              <div class="msg-email">${esc(m.email)}${m.telefon !== '—' ? ' · ' + esc(m.telefon) : ''}</div>
            </div>
            <div class="msg-meta">
              ${!m.okundu ? '<span class="tag yeni-tag">Yeni</span>' : ''}
              <span class="tag">${esc(KONU_LABEL[m.konu] || m.konu)}</span>
              ${m.oyun && m.oyun !== '—' ? `<span class="tag">${esc(OYUN_LABEL[m.oyun] || m.oyun)}</span>` : ''}
              <span class="msg-tarih">${esc(m.tarih)}</span>
            </div>
          </div>
          <div class="msg-body">${esc(m.mesaj)}</div>
          <div class="msg-actions">
            ${!m.okundu
              ? `<button class="btn-xs" onclick="okunduIsaretle(${m.id})">Okundu İşaretle</button>`
              : `<button class="btn-xs" onclick="okunmadiIsaretle(${m.id})">Okunmadı İşaretle</button>`
            }
            <button class="btn-xs del" onclick="silMesaj(${m.id})">Sil</button>
          </div>
        </div>
      `).join('');
    }

    function esc(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    /* ── Eylemler ── */
    window.okunduIsaretle = function(id) {
      const list = getMesajlar().map(m => m.id === id ? { ...m, okundu: true } : m);
      setMesajlar(list);
      renderAll();
    };

    window.okunmadiIsaretle = function(id) {
      const list = getMesajlar().map(m => m.id === id ? { ...m, okundu: false } : m);
      setMesajlar(list);
      renderAll();
    };

    window.silMesaj = function(id) {
      if (!confirm('Bu mesaj silinsin mi?')) return;
      setMesajlar(getMesajlar().filter(m => m.id !== id));
      renderAll();
    };

    document.getElementById('tumunuOkuBtn').addEventListener('click', () => {
      setMesajlar(getMesajlar().map(m => ({ ...m, okundu: true })));
      renderAll();
    });

    document.getElementById('tumunuSilBtn').addEventListener('click', () => {
      if (!confirm('Tüm mesajlar silinsin mi? Bu işlem geri alınamaz.')) return;
      setMesajlar([]);
      renderAll();
    });

    document.getElementById('searchInput').addEventListener('input', renderAll);
    document.getElementById('filterKonu').addEventListener('change', renderAll);
    document.getElementById('filterOkundu').addEventListener('change', renderAll);
  </script>

</body>
</html>
