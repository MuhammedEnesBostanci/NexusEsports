<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#001e28"/>
      <stop offset="100%" stop-color="#000a10"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <polygon points="8,0 40,0 40,40 0,40 0,8" fill="url(#bg)"/>
  <polygon points="0,8 8,0 11,0 0,11" fill="#00d5ff"/>
  <rect x="0" y="36" width="40" height="4" fill="#00d5ff"/>
  <!-- Hexagon frame -->
  <polygon points="20,6 32,13 32,27 20,34 8,27 8,13"
           fill="none" stroke="#00d5ff" stroke-width="1.8" filter="url(#glow)"/>
  <!-- Circuit lines inside -->
  <line x1="20" y1="13" x2="20" y2="20" stroke="#00d5ff" stroke-width="1.2"/>
  <line x1="20" y1="20" x2="27" y2="20" stroke="#00d5ff" stroke-width="1.2"/>
  <line x1="20" y1="20" x2="14" y2="26" stroke="#00d5ff" stroke-width="1.2"/>
  <!-- Node dots -->
  <circle cx="20" cy="20" r="2.5" fill="#00d5ff" filter="url(#glow)"/>
  <circle cx="20" cy="13" r="1.5" fill="#00d5ff"/>
  <circle cx="27" cy="20" r="1.5" fill="#00d5ff"/>
  <circle cx="14" cy="26" r="1.5" fill="#00d5ff"/>
</svg>
