<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1800"/>
      <stop offset="100%" stop-color="#0a0900"/>
    </linearGradient>
    <linearGradient id="bolt" x1="20" y1="5" x2="20" y2="35" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffe040"/>
      <stop offset="100%" stop-color="#f5a500"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur in="SourceGraphic" stdDeviation="1.3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <polygon points="8,0 40,0 40,40 0,40 0,8" fill="url(#bg)"/>
  <polygon points="0,8 8,0 11,0 0,11" fill="#f5c518"/>
  <rect x="0" y="36" width="40" height="4" fill="#f5c518"/>
  <!-- Lightning bolt -->
  <polygon points="24,5 13,21 21,21 16,35 27,19 19,19"
           fill="url(#bolt)" filter="url(#glow)"/>
  <!-- Small spark dots -->
  <circle cx="30" cy="10" r="1.5" fill="#f5c518" opacity="0.7"/>
  <circle cx="9"  cy="28" r="1.2" fill="#f5c518" opacity="0.5"/>
</svg>
