<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#160830"/>
      <stop offset="100%" stop-color="#080318"/>
    </linearGradient>
    <linearGradient id="star" x1="20" y1="5" x2="20" y2="35" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c090ff"/>
      <stop offset="100%" stop-color="#8844ee"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <polygon points="8,0 40,0 40,40 0,40 0,8" fill="url(#bg)"/>
  <polygon points="0,8 8,0 11,0 0,11" fill="#8844ee"/>
  <rect x="0" y="36" width="40" height="4" fill="#8844ee"/>
  <!-- 4-pointed star (nova burst) -->
  <polygon points="20,5 22.5,17.5 35,20 22.5,22.5 20,35 17.5,22.5 5,20 17.5,17.5"
           fill="url(#star)" filter="url(#glow)"/>
  <!-- Inner bright core -->
  <polygon points="20,12 21.5,18.5 28,20 21.5,21.5 20,28 18.5,21.5 12,20 18.5,18.5"
           fill="#c090ff"/>
  <circle cx="20" cy="20" r="3" fill="white" opacity="0.6"/>
</svg>
