<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#031508"/>
      <stop offset="100%" stop-color="#010703"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur in="SourceGraphic" stdDeviation="1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <polygon points="8,0 40,0 40,40 0,40 0,8" fill="url(#bg)"/>
  <polygon points="0,8 8,0 11,0 0,11" fill="#22cc44"/>
  <rect x="0" y="36" width="40" height="4" fill="#22cc44"/>
  <!-- Wolf paw: large palm pad + 4 toe pads -->
  <ellipse cx="20" cy="25" rx="7" ry="6" fill="#22cc44" filter="url(#glow)"/>
  <!-- Toe pads -->
  <ellipse cx="11" cy="17" rx="3.5" ry="4.5" fill="#22cc44" transform="rotate(-15 11 17)"/>
  <ellipse cx="18" cy="13" rx="3.5" ry="4.5" fill="#22cc44"/>
  <ellipse cx="25" cy="13" rx="3.5" ry="4.5" fill="#22cc44"/>
  <ellipse cx="31" cy="17" rx="3" ry="4" fill="#22cc44" transform="rotate(15 31 17)"/>
  <!-- Claw lines on palm -->
  <line x1="16" y1="22" x2="14" y2="20" stroke="#031508" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="20" y1="21" x2="20" y2="19" stroke="#031508" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="24" y1="22" x2="26" y2="20" stroke="#031508" stroke-width="1.2" stroke-linecap="round"/>
</svg>
