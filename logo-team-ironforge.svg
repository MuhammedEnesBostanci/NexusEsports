<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e0e00"/>
      <stop offset="100%" stop-color="#0a0500"/>
    </linearGradient>
    <linearGradient id="hammer" x1="10" y1="8" x2="30" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff9040"/>
      <stop offset="100%" stop-color="#f5751a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur in="SourceGraphic" stdDeviation="1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <polygon points="8,0 40,0 40,40 0,40 0,8" fill="url(#bg)"/>
  <polygon points="0,8 8,0 11,0 0,11" fill="#f5751a"/>
  <rect x="0" y="36" width="40" height="4" fill="#f5751a"/>
  <!-- Hammer handle -->
  <rect x="18" y="18" width="4.5" height="16" rx="1.5" fill="url(#hammer)" filter="url(#glow)"/>
  <!-- Hammer head -->
  <rect x="9" y="8" width="22" height="13" rx="2.5" fill="url(#hammer)" filter="url(#glow)"/>
  <!-- Strike sparks -->
  <circle cx="9"  cy="35" r="1.5" fill="#f5c518" opacity="0.8"/>
  <circle cx="31" cy="33" r="1.2" fill="#f5c518" opacity="0.6"/>
  <circle cx="20" cy="34" r="1"   fill="#f5c518" opacity="0.5"/>
</svg>
