<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#100505"/>
      <stop offset="50%"  stop-color="#1e0808"/>
      <stop offset="100%" stop-color="#2e0e0e"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#c03040"/>
      <stop offset="100%" stop-color="#ff6070"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Diagonal shapes - sağ -->
  <polygon points="450,0 800,0 800,420 550,420" fill="#1a0608" opacity="0.8"/>
  <polygon points="600,0 800,0 800,200" fill="#c03040" opacity="0.06"/>

  <!-- Diagonal çizgiler -->
  <g stroke="#c03040" stroke-width="1" opacity="0.15">
    <line x1="200" y1="0" x2="0" y2="300"/>
    <line x1="320" y1="0" x2="100" y2="340"/>
    <line x1="440" y1="0" x2="220" y2="380"/>
    <line x1="560" y1="0" x2="340" y2="420"/>
  </g>

  <!-- V Şekli (VALORANT simgesi) -->
  <g transform="translate(400,160)" filter="url(#glow)">
    <polygon points="-90,-60 0,80 90,-60 70,-60 0,50 -70,-60" fill="none" stroke="url(#red)" stroke-width="3" opacity="0.6"/>
    <polygon points="-55,-60 0,30 55,-60 40,-60 0,10 -40,-60" fill="#c03040" opacity="0.15"/>
  </g>

  <!-- Sol aksan çizgisi -->
  <rect x="0" y="0" width="4" height="420" fill="url(#red)"/>
  <rect x="0" y="0" width="4" height="420" fill="url(#red)" opacity="0.3" transform="translate(8,0)"/>

  <!-- Başlık -->
  <text x="400" y="275" text-anchor="middle" fill="#ffffff" font-family="Arial Black,sans-serif"
        font-size="62" font-weight="900" letter-spacing="12" opacity="0.9" filter="url(#glow)">VALORANT</text>
  <rect x="270" y="288" width="260" height="2" rx="1" fill="url(#red)" opacity="0.8"/>
  <text x="400" y="316" text-anchor="middle" fill="#c03040" font-family="Arial,sans-serif"
        font-size="12" letter-spacing="5" opacity="0.8">VCT TÜRKİYE OPEN SERIES 2026</text>
</svg>
