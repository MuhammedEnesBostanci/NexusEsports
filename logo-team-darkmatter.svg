<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#200505"/>
      <stop offset="100%" stop-color="#0a0101"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur in="SourceGraphic" stdDeviation="1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <polygon points="8,0 40,0 40,40 0,40 0,8" fill="url(#bg)"/>
  <polygon points="0,8 8,0 11,0 0,11" fill="#cc1111"/>
  <rect x="0" y="36" width="40" height="4" fill="#cc1111"/>
  <!-- Atom nucleus -->
  <circle cx="20" cy="19" r="3" fill="#cc1111" filter="url(#glow)"/>
  <!-- 3 orbit rings at different angles -->
  <ellipse cx="20" cy="19" rx="13" ry="5" stroke="#cc1111" stroke-width="1.5" fill="none"/>
  <ellipse cx="20" cy="19" rx="13" ry="5" stroke="#ff4444" stroke-width="1" fill="none" transform="rotate(60 20 19)"/>
  <ellipse cx="20" cy="19" rx="13" ry="5" stroke="#ff4444" stroke-width="1" fill="none" transform="rotate(120 20 19)"/>
  <!-- Orbiting electrons -->
  <circle cx="33" cy="19" r="1.8" fill="#ff6060"/>
  <circle cx="13.5" cy="27.6" r="1.8" fill="#ff6060"/>
  <circle cx="13.5" cy="10.4" r="1.8" fill="#ff6060"/>
</svg>
