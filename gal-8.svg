<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060e0a"/>
      <stop offset="100%" stop-color="#0c2018"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00aa60"/>
      <stop offset="100%" stop-color="#00e890"/>
    </linearGradient>
    <linearGradient id="trophy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd060"/>
      <stop offset="100%" stop-color="#c09020"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="confetti-blur">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Arka ışık huzmesi -->
  <polygon points="400,0 300,300 500,300" fill="#00e890" opacity="0.04"/>
  <polygon points="400,0 250,350 550,350" fill="#00c878" opacity="0.03"/>

  <!-- Çemberler arka plan -->
  <circle cx="400" cy="200" r="180" fill="none" stroke="#00aa60" stroke-width="0.5" opacity="0.15"/>
  <circle cx="400" cy="200" r="130" fill="none" stroke="#00aa60" stroke-width="0.5" opacity="0.1"/>
  <circle cx="400" cy="200" r="80"  fill="none" stroke="#00e890" stroke-width="0.5" opacity="0.12"/>

  <!-- Konfeti -->
  <g opacity="0.8" filter="url(#confetti-blur)">
    <rect x="80"  y="50"  width="8" height="8" fill="#ffd060" transform="rotate(25 84 54)"/>
    <rect x="140" y="90"  width="6" height="6" fill="#ff6090" transform="rotate(40 143 93)"/>
    <rect x="200" y="40"  width="7" height="7" fill="#60e0ff" transform="rotate(15 203 43)"/>
    <rect x="260" y="110" width="6" height="6" fill="#00e890" transform="rotate(55 263 113)"/>
    <rect x="320" y="30"  width="8" height="8" fill="#ffd060" transform="rotate(30 324 34)"/>
    <rect x="380" y="70"  width="6" height="6" fill="#ff6090" transform="rotate(45 383 73)"/>
    <rect x="440" y="25"  width="7" height="7" fill="#a060ff" transform="rotate(20 443 28)"/>
    <rect x="500" y="80"  width="6" height="6" fill="#60e0ff" transform="rotate(60 503 83)"/>
    <rect x="560" y="45"  width="8" height="8" fill="#ffd060" transform="rotate(35 564 49)"/>
    <rect x="620" y="100" width="6" height="6" fill="#00e890" transform="rotate(50 623 103)"/>
    <rect x="680" y="55"  width="7" height="7" fill="#ff6090" transform="rotate(25 683 58)"/>
    <rect x="720" y="120" width="6" height="6" fill="#ffd060" transform="rotate(40 723 123)"/>
    <rect x="110" y="160" width="6" height="6" fill="#a060ff" transform="rotate(30 113 163)"/>
    <rect x="690" y="170" width="7" height="7" fill="#60e0ff" transform="rotate(45 693 173)"/>
    <rect x="60"  y="200" width="6" height="6" fill="#ffd060" transform="rotate(20 63 203)"/>
    <rect x="740" y="210" width="6" height="6" fill="#ff6090" transform="rotate(55 743 213)"/>
    <!-- Düşen konfeti -->
    <rect x="170" y="300" width="5" height="5" fill="#ffd060" transform="rotate(30 172 302)"/>
    <rect x="330" y="320" width="6" height="6" fill="#ff6090" transform="rotate(45 333 323)"/>
    <rect x="470" y="290" width="5" height="5" fill="#60e0ff" transform="rotate(20 472 292)"/>
    <rect x="630" y="310" width="6" height="6" fill="#00e890" transform="rotate(50 633 313)"/>
  </g>

  <!-- Kupa gövdesi -->
  <g transform="translate(400,195)" filter="url(#glow)">
    <!-- Ayak -->
    <rect x="-10" y="60" width="20" height="35" fill="url(#trophy)"/>
    <rect x="-30" y="93" width="60" height="10" fill="url(#trophy)" rx="3"/>
    <!-- Kupa ellipsi -->
    <ellipse cx="0" cy="0" rx="48" ry="64" fill="none" stroke="url(#trophy)" stroke-width="4.5"/>
    <!-- Kulplar -->
    <path d="M-48,0 C-65,-25 -65,-60 -36,-65" fill="none" stroke="url(#trophy)" stroke-width="4"/>
    <path d="M48,0 C65,-25 65,-60 36,-65" fill="none" stroke="url(#trophy)" stroke-width="4"/>
    <!-- İç parlama -->
    <ellipse cx="0" cy="-5" rx="30" ry="40" fill="#ffd060" opacity="0.08"/>
    <!-- 1 rakamı -->
    <text x="0" y="8" text-anchor="middle" fill="url(#trophy)" font-family="Arial Black,sans-serif"
          font-size="28" font-weight="900" opacity="0.9">1</text>
    <!-- Yıldız üstte -->
    <circle cx="0" cy="-52" r="6" fill="#ffd060" opacity="0.9"/>
  </g>

  <!-- Podyum basamakları -->
  <rect x="250" y="330" width="100" height="30" fill="#1a2a20" stroke="#00aa60" stroke-width="1" rx="2"/>
  <rect x="350" y="315" width="100" height="45" fill="#1e3028" stroke="#00c878" stroke-width="1.5" rx="2"/>
  <rect x="450" y="325" width="100" height="35" fill="#1a2a20" stroke="#00aa60" stroke-width="1" rx="2"/>
  <text x="300"  y="352" text-anchor="middle" fill="#00aa60" font-family="Arial Black,sans-serif" font-size="14" font-weight="900" opacity="0.8">2</text>
  <text x="400"  y="352" text-anchor="middle" fill="#ffd060" font-family="Arial Black,sans-serif" font-size="16" font-weight="900" opacity="0.9">1</text>
  <text x="500"  y="350" text-anchor="middle" fill="#c08030" font-family="Arial Black,sans-serif" font-size="14" font-weight="900" opacity="0.8">3</text>

  <!-- Sol aksan -->
  <rect x="0" y="0" width="4" height="450" fill="url(#green)"/>

  <!-- Zemin -->
  <rect x="0" y="380" width="800" height="70" fill="#040a06"/>

  <text x="400" y="407" text-anchor="middle" fill="#ffffff" font-family="Arial Black,sans-serif"
        font-size="22" font-weight="900" letter-spacing="4" opacity="0.95" filter="url(#glow)">ÖDÜL TÖRENİ</text>
  <rect x="270" y="417" width="260" height="2" rx="1" fill="url(#green)" opacity="0.7"/>
  <text x="400" y="439" text-anchor="middle" fill="#00aa60" font-family="Arial,sans-serif"
        font-size="11" letter-spacing="4" opacity="0.8">NEXUS ESPORTS 2026</text>
</svg>
