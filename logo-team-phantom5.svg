<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#101010"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <polygon points="8,0 40,0 40,40 0,40 0,8" fill="url(#bg)"/>
  <polygon points="0,8 8,0 11,0 0,11" fill="#aaaaaa"/>
  <rect x="0" y="36" width="40" height="4" fill="#aaaaaa"/>
  <!-- Ghost body: dome top + wavy bottom -->
  <path d="M11 22 Q11 8 20 8 Q29 8 29 22 L29 32
           Q26.5 29.5 24 32 Q21.5 34.5 20 32 Q18.5 29.5 16 32 Q13.5 34.5 11 32 Z"
        fill="#aaaaaa" filter="url(#glow)"/>
  <!-- Ghost eyes -->
  <ellipse cx="16" cy="20" rx="2.5" ry="3" fill="#101010"/>
  <ellipse cx="24" cy="20" rx="2.5" ry="3" fill="#101010"/>
  <!-- Eye glints -->
  <circle cx="17" cy="19" r="0.8" fill="#aaaaaa"/>
  <circle cx="25" cy="19" r="0.8" fill="#aaaaaa"/>
</svg>
