<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0710"/>
      <stop offset="100%" stop-color="#1a0e28"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6020a0"/>
      <stop offset="100%" stop-color="#a060e0"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1840"/>
      <stop offset="100%" stop-color="#061030"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="monitor-glow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Arka duvar izgarası -->
  <g stroke="#6020a0" stroke-width="0.5" opacity="0.12">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="100" y1="0" x2="100" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/>
  </g>

  <!-- Masa yüzeyinin perspektif gölgesi -->
  <polygon points="50,290 750,290 800,380 0,380" fill="#0a0610" opacity="0.8"/>

  <!-- Masa yüzeyi -->
  <rect x="0" y="280" width="800" height="25" fill="#1a1020" stroke="#2a1a38" stroke-width="1"/>

  <!-- Monitör ayağı 1 (sol) -->
  <rect x="175" y="255" width="6" height="30" fill="#1a1020"/>
  <rect x="160" y="282" width="36" height="5" fill="#1a1020" rx="2"/>

  <!-- Monitör 1 (sol) -->
  <rect x="100" y="140" width="160" height="120" fill="url(#screen)" rx="4" stroke="#3a2050" stroke-width="1.5"/>
  <rect x="104" y="144" width="152" height="112" fill="#0a1040" rx="2"/>
  <!-- Ekran içeriği - CS2 oynanıyor -->
  <rect x="106" y="146" width="148" height="108" fill="#0a1840" rx="1" opacity="0.8"/>
  <circle cx="180" cy="200" r="18" fill="none" stroke="#4060e0" stroke-width="1" opacity="0.7"/>
  <line x1="160" y1="200" x2="200" y2="200" stroke="#4060e0" stroke-width="1" opacity="0.5"/>
  <line x1="180" y1="180" x2="180" y2="220" stroke="#4060e0" stroke-width="1" opacity="0.5"/>
  <rect x="130" y="237" width="100" height="4" fill="#4060e0" rx="1" opacity="0.3"/>
  <rect x="130" y="243" width="60" height="3" fill="#4060e0" rx="1" opacity="0.2"/>
  <!-- Ekran glow -->
  <rect x="100" y="140" width="160" height="120" fill="#4060e0" opacity="0.04" filter="url(#monitor-glow)"/>

  <!-- Monitör ayağı 2 (merkez) -->
  <rect x="397" y="248" width="6" height="35" fill="#1a1020"/>
  <rect x="380" y="280" width="40" height="5" fill="#1a1020" rx="2"/>

  <!-- Monitör 2 (merkez - geniş) -->
  <rect x="280" y="120" width="240" height="140" fill="url(#screen)" rx="4" stroke="#3a2050" stroke-width="1.5"/>
  <rect x="284" y="124" width="232" height="132" fill="#08103a" rx="2"/>
  <!-- Ekran içeriği - harita/oyun -->
  <rect x="286" y="126" width="228" height="128" fill="#0c1640" rx="1" opacity="0.9"/>
  <!-- Oyun haritası -->
  <rect x="310" y="150" width="180" height="80" fill="#0a2050" rx="2"/>
  <polygon points="370,165 400,190 430,165 430,210 370,210" fill="#4060c0" opacity="0.4"/>
  <circle cx="400" cy="185" r="12" fill="none" stroke="#60a0ff" stroke-width="1.5" opacity="0.7"/>
  <circle cx="400" cy="185" r="4" fill="#60a0ff" opacity="0.8"/>
  <rect x="296" y="240" width="208" height="5" fill="#4060e0" rx="1" opacity="0.25"/>
  <!-- Ekran glow -->
  <rect x="280" y="120" width="240" height="140" fill="#6080ff" opacity="0.05" filter="url(#monitor-glow)"/>

  <!-- Monitör ayağı 3 (sağ) -->
  <rect x="619" y="255" width="6" height="30" fill="#1a1020"/>
  <rect x="604" y="282" width="36" height="5" fill="#1a1020" rx="2"/>

  <!-- Monitör 3 (sağ) -->
  <rect x="540" y="140" width="160" height="120" fill="url(#screen)" rx="4" stroke="#3a2050" stroke-width="1.5"/>
  <rect x="544" y="144" width="152" height="112" fill="#0a1040" rx="2"/>
  <!-- Ekran içeriği - istatistikler -->
  <rect x="546" y="146" width="148" height="108" fill="#0c1630" rx="1" opacity="0.8"/>
  <rect x="558" y="158" width="40" height="6" fill="#9060ff" rx="1" opacity="0.6"/>
  <rect x="558" y="170" width="110" height="3" fill="#a060ff" rx="1" opacity="0.4"/>
  <rect x="558" y="178" width="80" height="3" fill="#a060ff" rx="1" opacity="0.3"/>
  <rect x="558" y="186" width="95" height="3" fill="#a060ff" rx="1" opacity="0.35"/>
  <rect x="558" y="200" width="124" height="18" fill="#6020a0" rx="2" opacity="0.35"/>
  <rect x="558" y="224" width="70" height="3" fill="#9060ff" rx="1" opacity="0.25"/>
  <rect x="558" y="237" width="110" height="3" fill="#9060ff" rx="1" opacity="0.2"/>
  <!-- Ekran glow -->
  <rect x="540" y="140" width="160" height="120" fill="#9060ff" opacity="0.04" filter="url(#monitor-glow)"/>

  <!-- Klavyeler -->
  <rect x="105" y="285" width="140" height="12" fill="#120a1a" rx="2" stroke="#2a1838" stroke-width="0.5"/>
  <rect x="295" y="285" width="210" height="12" fill="#120a1a" rx="2" stroke="#2a1838" stroke-width="0.5"/>
  <rect x="545" y="285" width="140" height="12" fill="#120a1a" rx="2" stroke="#2a1838" stroke-width="0.5"/>

  <!-- Fareler -->
  <ellipse cx="260" cy="292" rx="14" ry="8" fill="#120a1a" stroke="#2a1838" stroke-width="0.5"/>
  <ellipse cx="515" cy="292" rx="14" ry="8" fill="#120a1a" stroke="#2a1838" stroke-width="0.5"/>
  <ellipse cx="700" cy="292" rx="14" ry="8" fill="#120a1a" stroke="#2a1838" stroke-width="0.5"/>

  <!-- Kulaklıklar -->
  <g transform="translate(180,270)" stroke="#a060e0" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M-12,-12 Q0,-24 12,-12"/>
    <rect x="-14" y="-12" width="6" height="10" rx="2" fill="#6020a0"/>
    <rect x="8" y="-12" width="6" height="10" rx="2" fill="#6020a0"/>
  </g>
  <g transform="translate(620,270)" stroke="#a060e0" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M-12,-12 Q0,-24 12,-12"/>
    <rect x="-14" y="-12" width="6" height="10" rx="2" fill="#6020a0"/>
    <rect x="8" y="-12" width="6" height="10" rx="2" fill="#6020a0"/>
  </g>

  <!-- Zemin çizgisi -->
  <rect x="0" y="380" width="800" height="70" fill="#080510"/>

  <!-- Sol aksan -->
  <rect x="0" y="0" width="4" height="450" fill="url(#purple)"/>

  <text x="400" y="407" text-anchor="middle" fill="#ffffff" font-family="Arial Black,sans-serif"
        font-size="20" font-weight="900" letter-spacing="4" opacity="0.95" filter="url(#glow)">PRO ANTRENMAN SAHASI</text>
  <rect x="230" y="418" width="340" height="2" rx="1" fill="url(#purple)" opacity="0.7"/>
  <text x="400" y="440" text-anchor="middle" fill="#9060d0" font-family="Arial,sans-serif"
        font-size="11" letter-spacing="3" opacity="0.8">NEXUS ESPORTS · BOOTCAMP 2026</text>
</svg>
