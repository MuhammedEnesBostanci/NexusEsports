<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#080a06"/>
      <stop offset="50%" stop-color="#120e06"/>
      <stop offset="100%" stop-color="#1c0a08"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e03020"/>
      <stop offset="100%" stop-color="#901808"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Ejderha kanatları soyut -->
  <polygon points="400,210 600,50 720,150 650,210" fill="#c03020" opacity="0.08"/>
  <polygon points="400,210 200,50 80,150  150,210" fill="#c03020" opacity="0.08"/>
  <polygon points="400,210 580,80 680,200 560,250" fill="#e03020" opacity="0.04"/>
  <polygon points="400,210 220,80 120,200 240,250" fill="#e03020" opacity="0.04"/>

  <!-- Merkez ateş halkası -->
  <circle cx="400" cy="180" r="110" fill="none" stroke="#c03020" stroke-width="1.5" opacity="0.2"/>
  <circle cx="400" cy="180" r="75"  fill="none" stroke="#e04030" stroke-width="1"   opacity="0.15"/>
  <circle cx="400" cy="180" r="40"  fill="#c03020" opacity="0.12"/>

  <!-- Sol aksan -->
  <rect x="0" y="0" width="4" height="420" fill="url(#red)"/>

  <!-- Başlık -->
  <text x="400" y="336" text-anchor="middle" fill="#ffffff" font-family="Arial Black,sans-serif"
        font-size="72" font-weight="900" letter-spacing="4" opacity="0.9" filter="url(#glow)">DOTA 2</text>
  <rect x="260" y="350" width="280" height="2" rx="1" fill="url(#red)" opacity="0.8"/>
  <text x="400" y="378" text-anchor="middle" fill="#e03020" font-family="Arial,sans-serif"
        font-size="12" letter-spacing="5" opacity="0.8">NEXUS INVITATIONAL 2026</text>
</svg>
